<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Consultar Estado — Acceso</title>
    <link rel="stylesheet" href="check_status.css">
    <script src="api-config.js"></script>
</head>

<body>

    <div class="page-wrapper">

        <!-- ── PAGE HEADER ──────────────────────────────────── -->
        <div class="page-header">
            <div class="logo-bar">
                <img src="img/logo-prologis.png" alt="Prologis">
                <img src="img/logo-martel.png" alt="Martel">
            </div>
            <div class="page-title-block">
                <h1>Consultar Estado</h1>
                <p>Ingresa tu código de solicitud o token para ver el estado</p>
            </div>
        </div>

        <!-- ── MAIN CARD ─────────────────────────────────────── -->
        <div class="main-card">

            <!-- Solicitud section -->
            <div class="query-section">
                <label class="field-label">Código de Solicitud (REQ-xxxxxx)</label>
                <div class="input-group">
                    <input type="text" id="requestId" placeholder="ej: REQ-abc123">
                </div>
                <button class="btn btn-brand" onclick="consultarSolicitud()">
                    Consultar Solicitud
                </button>
            </div>

            <!-- Divider -->
            <div class="section-divider">
                <div class="divider-line"></div>
                <div class="divider-circle">O</div>
                <div class="divider-line"></div>
            </div>

            <!-- Token section -->
            <div class="query-section">
                <label class="field-label">Token de Acceso</label>
                <div class="input-group">
                    <input type="text" id="tokenInput" placeholder="Tu token de 8 dígitos">
                </div>
                <button class="btn btn-blue" onclick="consultarToken()">
                    Consultar Token
                </button>
            </div>

            <!-- Error box -->
            <div id="errorBox" class="error-box"></div>

            <!-- Result box -->
            <div class="result-wrap">
                <div id="statusBox" class="result-box">
                    <div id="statusContent"></div>
                </div>
            </div>

        </div><!-- /main-card -->

    </div><!-- /page-wrapper -->

    <!-- ── NAVBAR ─────────────────────────────────────────── -->
    <nav class="navbar">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Inicio</span>
        </a>
        <a href="visitor_request.html" class="nav-item">
            <span class="nav-icon">📝</span>
            <span class="nav-label">Registro</span>
        </a>
        <a href="check_status.html" class="nav-item active">
            <div class="nav-active-bar"></div>
            <span class="nav-icon">✓</span>
            <span class="nav-label">Estado</span>
        </a>
    </nav>

    <!-- ── SCRIPTS (sin cambios funcionales) ─────────────── -->
    <script>
        function consultarSolicitud() {
            const requestId = document.getElementById('requestId').value.trim();
            if (!requestId) { mostrarError('Por favor ingresa tu código de solicitud'); return; }

            fetch(apiUrl(`/api/access/request-status/${requestId}`))
                .then(r => r.json())
                .then(d => {
                    ocultarError();
                    if (d.found) {
                        const statusText = d.status === 'pending' ? 'Pendiente de Aprobación' : d.status;
                        const tipoAcceso = d.accessType === 'frequent'
                            ? '🔁 Acceso Frecuente (múltiples entradas)'
                            : '⏱️ Acceso Temporal (una entrada/salida)';
                        const icons = { pending: '⏳', approved: '✅', denied: '❌', used: '🔒' };

                        document.getElementById('statusBox').className = 'result-box status-' + d.status;
                        document.getElementById('statusContent').innerHTML = `
              <div class="result-status-head">
                <span class="result-status-icon">${icons[d.status] || '📋'}</span>
                <span class="result-status-label">${statusText}</span>
              </div>
              <div class="info-row">
                <span class="info-key">Nombre</span>
                <span class="info-val">${d.visitorName}</span>
              </div>
              <div class="info-row">
                <span class="info-key">Destino</span>
                <span class="info-val">${d.destination}</span>
              </div>
              <div class="info-row">
                <span class="info-key">Anfitrión</span>
                <span class="info-val">${d.hostName}</span>
              </div>
              <div class="info-row">
                <span class="info-key">Tipo</span>
                <span class="info-val">${tipoAcceso}</span>
              </div>
              <div class="info-row">
                <span class="info-key">Solicitado</span>
                <span class="info-val">${new Date(d.createdAt).toLocaleString()}</span>
              </div>
              ${d.status === 'pending' ? '<p class="result-notice">Aguarda la confirmación del anfitrión...</p>' : ''}
            `;
                        document.getElementById('statusBox').style.display = 'block';
                    } else {
                        mostrarError('Solicitud no encontrada. Puede ya haber sido procesada. Verifica tu token de acceso.');
                    }
                })
                .catch(() => mostrarError('Error al consultar. Intenta de nuevo.'));
        }

        function consultarToken() {
            const token = document.getElementById('tokenInput').value.trim();
            if (!token) { mostrarError('Por favor ingresa tu token de acceso'); return; }

            fetch(apiUrl(`/api/access/token-info/${token}`))
                .then(r => r.json())
                .then(d => {
                    ocultarError();
                    if (d.error) {
                        mostrarError(d.error);
                    } else {
                        const icons = { approved: '✅', used: '🔒', pending: '⏳' };
                        const labels = { approved: 'Aprobado', used: 'Utilizado', pending: 'Pendiente' };
                        const tipoAcceso = d.accessType === 'frequent' ? '🔁 Acceso Frecuente' : '⏱️ Acceso Temporal';

                        document.getElementById('statusBox').className = 'result-box status-' + d.status;

                        let content = `
              <div class="result-status-head">
                <span class="result-status-icon">${icons[d.status] || '📋'}</span>
                <span class="result-status-label">${labels[d.status] || d.status}</span>
              </div>
              <div class="info-row">
                <span class="info-key">Visitante</span>
                <span class="info-val">${d.visitorName}</span>
              </div>
              <div class="info-row">
                <span class="info-key">Destino</span>
                <span class="info-val">${d.destination}</span>
              </div>
              <div class="info-row">
                <span class="info-key">Tipo</span>
                <span class="info-val">${tipoAcceso}</span>
              </div>
              <div class="info-row">
                <span class="info-key">Token</span>
                <span class="info-val"><span class="token-chip">${token}</span></span>
              </div>
            `;

                        if (d.accessType === 'frequent') {
                            content += `
                <div class="info-row">
                  <span class="info-key">Usos</span>
                  <span class="info-val">${d.usageCount} de ${d.maxUses}</span>
                </div>
                <div class="info-row">
                  <span class="info-key">Restantes</span>
                  <span class="info-val">${d.remainingUses}</span>
                </div>
              `;
                        }

                        content += `
              <div class="info-row" style="margin-top:8px; opacity:0.7; font-size:0.82rem;">
                <span class="info-key">Creado</span>
                <span class="info-val">${new Date(d.createdAt).toLocaleString()}</span>
              </div>
            `;

                        if (d.usedAt) {
                            content += `
                <div class="info-row" style="opacity:0.7; font-size:0.82rem;">
                  <span class="info-key">Utilizado</span>
                  <span class="info-val">${new Date(d.usedAt).toLocaleString()}</span>
                </div>
              `;
                        }

                        document.getElementById('statusContent').innerHTML = content;
                        document.getElementById('statusBox').style.display = 'block';
                    }
                })
                .catch(() => mostrarError('Error al consultar token. Intenta de nuevo.'));
        }

        function mostrarError(mensaje) {
            const el = document.getElementById('errorBox');
            el.textContent = '⚠️ ' + mensaje;
            el.style.display = 'block';
            document.getElementById('statusBox').style.display = 'none';
        }

        function ocultarError() {
            document.getElementById('errorBox').style.display = 'none';
        }

        document.getElementById('requestId').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') consultarSolicitud();
        });
        document.getElementById('tokenInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') consultarToken();
        });
    </script>
</body>

</html>
